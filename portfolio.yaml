# Nova Engine — portfolio manifest
# One entry per "book" = (wrapper x asset class x broker x tax policy).
# Replace the *_PLACEHOLDER account IDs with your real IBKR sub-account strings
# once the FreeTrade -> IBKR migration completes (all appear under one login).
#
# Rules baked in here:
#   - ISA / SIPP: tax_policy null (tax-free / tax-sheltered). Equities/ETFs only.
#   - GIA: tax_policy uk_cgt is ACTIVE. Set higher_rate per the operator's band.
#   - Options / FX must NEVER be added to ISA or SIPP allowed_assets.

books:
  - book_id: ibkr_isa_equity
    wrapper: ISA
    broker: IBKR
    ibkr_account_id: "U_ISA_PLACEHOLDER"
    allowed_assets: ["EQUITY", "ETF"]
    tax_policy: null
    gate_min: 80                  # VALIDATED 2026-06-16: 8y-daily honest mark-to-market
                                  # PASS (win 70.7%, Sortino 1.123 robust, DD 7.6% < 18%).
                                  # gate 80 (not 78) is what firms Sortino above 1.0.
    sizing:
      type: atr_sizing            # CANONICAL 2026-06-18: risk-based (vol-throttled) sizing.
                                  # Replaces flat nav_pct. HALVED the GFC out-of-sample
                                  # Monte-Carlo tail (MC 18.3%->8.5%) with ZERO in-sample
                                  # regression — ATR stops widen in a crash so size auto-shrinks
                                  # (constant per-trade risk). Only residual GFC failure is the
                                  # size-invariant Sortino (~0.71), the strategy's 2008 shape.
      risk_pct: 0.35              # per-trade risk = 0.35% of NAV (~matches old nav_pct effective
                                  # risk: 8% position x 5% stop; now with the vol-throttle)
      leverage: 0.35              # REUSED as a per-position NOTIONAL CAP (notional <= NAV*0.35)
                                  # to bound single-name concentration — NOT margin.
      unit: shares
      stop_atr_multiplier: 2.0
      take_atr_multiplier: 4.0    # 2:1 reward:risk

  # SIPP — NOTE: IBKR is NOT a direct SIPP provider. At go-live this account is
  # opened by a third-party UK SIPP administrator/trustee that permits an IBKR
  # dealing account: the trustee holds the IBKR account in the pension scheme's
  # name and grants the member trading authority. IBKR = custody + execution;
  # the third party = the SIPP wrapper. The engine is account-agnostic, so only
  # ibkr_account_id changes (placeholder -> the trustee-held sub-account). Before
  # live: confirm the chosen administrator (a) permits IBKR and (b) allows the
  # instruments traded. SIPP permitted-investment rules mean equities/ETFs only —
  # NO FX/leverage/options (already enforced via allowed_assets). ISA/GIA/FOREX
  # are native IBKR accounts and need no third party.
  - book_id: ibkr_sipp_equity
    wrapper: SIPP
    broker: IBKR
    ibkr_account_id: "U_SIPP_PLACEHOLDER"
    allowed_assets: ["EQUITY", "ETF"]   # long-term ETFs preferred
    tax_policy: null
    # SIPP = PATH A (2026-06-18): low-turnover allocation holding an EQUAL-WEIGHT
    # ACCUMULATING THEMATIC basket (AI/tech infra, data centres, critical materials,
    # renewables — see config.yaml `allocation_basket`) for decades, regime-de-risked.
    # Judged on LONG-HORIZON metrics (CAGR/MAR/% positive months), NOT a 5% interim-DD
    # rail (which is unachievable for any growth SIPP; see validation.py allocation
    # profile). ACCEPTED, DOCUMENTED RISK: pure thematic does not survive a GFC-scale
    # crash even on long-horizon metrics (the lost-decade tail) — operator's informed
    # choice; the hard live-authorization gate (operator sign-off) is the backstop.
    strategy: allocation
    gate_min: 75                  # per-book ENTRY floor: only buy in strong regimes
    aggressive_liquidation: true  # regime de-risk to cash
    derisk_gate: 65               # EXIT floor (hysteresis): hold through dips 65-75,
                                  # only sell on genuine deterioration (anti-whipsaw)
    guardrails:
      max_correlation: 0.99       # HOLD ALL FOUR themes: the deliberately-chosen basket
                                  # is correlated; the default 0.8 corr guard would
                                  # de-duplicate it to a single holding. Raised so the
                                  # equal-weight thematic basket is held in full.
    sizing:
      type: nav_pct
      max_per_position_pct: 25    # equal-weight: 4 themes x 25% = ~100% invested while
                                  # the regime is favourable (de-risk moves to cash when not)
      leverage: 1.0
      unit: shares
      stop_pct: 0.30             # wide: exits are regime-driven, not stop-driven
      take_pct: 10.0             # effectively no take-profit (hold long-term)
      trailing_pct: 0.30

  - book_id: ibkr_gia_equity
    wrapper: GIA
    broker: IBKR
    ibkr_account_id: "U_GIA_PLACEHOLDER"
    allowed_assets: ["EQUITY", "ETF"]
    tax_policy:
      type: uk_cgt
      higher_rate: false              # set true if a higher-rate taxpayer
    gate_min: 80                  # MIRRORS ISA (was 78, tuned for the old nav_pct GIA): now
                                  # that GIA runs ISA's strategy/sizing/mandate, it uses ISA's
                                  # gate. gate 80 firms in-sample Sortino >= 1.0 (0.84 at 78).
    # CANONICAL 2026-06-18: GIA mirrors the ISA strategy + sizing. Per "Wrapper⊥Strategy",
    # drawdown is a market property, not a tax property — so GIA shares ISA's market-risk
    # MANDATE (see validation.py GIA profile, now = ISA's). Tax efficiency is a separate
    # realization-timing overlay (defer CGT, harvest losses vs the £3k AEA, low turnover),
    # not a tighter risk profile. Risk-based ATR sizing halved GIA's GFC MC tail (17.8->8.9%).
    sizing:
      type: atr_sizing
      risk_pct: 0.35
      leverage: 0.35              # per-position notional cap (notional <= NAV*0.35), not margin
      unit: shares
      stop_atr_multiplier: 2.0
      take_atr_multiplier: 4.0

  # Leveraged spot Forex. Wrapper-locked to a taxable margin account — FX/options
  # must NEVER appear in ISA/SIPP allowed_assets. CGT applies to spot FX gains for
  # a UK individual, so tax_policy is uk_cgt (same as GIA). Judged at the
  # account/equity-curve level; sizing is ATR + leverage-capped.
  - book_id: ibkr_forex_margin
    wrapper: MARGIN
    broker: IBKR
    ibkr_account_id: "U_FX_PLACEHOLDER"
    allowed_assets: ["FX"]
    tax_policy:
      type: uk_cgt
      higher_rate: false              # set true if a higher-rate taxpayer
    sizing:
      type: atr_sizing
      risk_pct: 1.0                   # per-trade risk (reduced to 1% to bring the trend
                                      # book's drawdown under the 20% cap with margin;
                                      # sizing scales DD but NOT PF/MAR/sample, which
                                      # all already pass — 6-pair exposure needed 1%, not 1.5%)
      leverage: 5.0                   # leverage cap <= 5:1 (notional <= 5 x NAV)
      unit: units
      stop_atr_multiplier: 2.0
      take_atr_multiplier: 4.0
      trailing_atr_multiplier: 2.0
    guardrails:
      max_drawdown_pct: 20.0          # Forex profile: DD <= 20%
      daily_loss_cap_pct: 3.0
      max_concurrent_positions: 4     # caps simultaneous FX exposure (tightened 6->4
                                      # in the risk overhaul to cut concurrent drawdown)
      max_correlation: 0.8
      circuit_breaker_losses: 6       # pause new entries after 6 consecutive losses
      circuit_breaker_cooldown: 15    # ...for 15 trading cycles (let the choppy regime pass)
