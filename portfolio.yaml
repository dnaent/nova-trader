# Nova Engine — portfolio manifest
# One entry per "book" = (wrapper x asset class x broker x tax policy).
# Replace the *_PLACEHOLDER account IDs with your real IBKR sub-account strings
# once the FreeTrade -> IBKR migration completes (all appear under one login).
#
# Rules baked in here:
#   - ISA / SIPP: tax_policy null (tax-free / tax-sheltered). Equities/ETFs only.
#   - GIA: tax_policy uk_cgt is ACTIVE. Set higher_rate per the operator's band.
#   - Options / FX must NEVER be added to ISA or SIPP allowed_assets.

books:
  - book_id: ibkr_isa_equity
    wrapper: ISA
    broker: IBKR
    ibkr_account_id: "U_ISA_PLACEHOLDER"
    allowed_assets: ["EQUITY", "ETF"]
    tax_policy: null
    # ISA "Aeroplane" = GROWTH ALLOCATION (option (d), 2026-06-19, operator-approved).
    # CHANGED from the tactical ML scanner to a low-turnover, regime-gated, DIVERSIFIED
    # GROWTH allocation — the only structure that is consistently stable AND profitable
    # across regimes. Rationale: the tactical scanner's quant_score has ~no edge (the
    # regime gate carried it) and its churn produced a low-Sortino lumpy curve that
    # diversifiers couldn't fix; an allocation book (curve-validated on MAR / % positive
    # months) is stabler and, growth-tilted, MORE profitable (in-sample MAR 0.64 vs the
    # SIPP's 0.56) while surviving the GFC positively (MAR 0.156, 60% positive months —
    # no lost decade). Tax-free wrapper => can run hotter (growth-tilted) than the SIPP.
    strategy: allocation
    gate_min: 75                  # validated allocation entry floor (as SIPP)
    aggressive_liquidation: true  # regime de-risk to cash
    derisk_gate: 65               # EXIT floor (hysteresis), anti-whipsaw
    # Per-book GROWTH BASKET: growth core/satellites + a gold crash-diversifier + a
    # global ballast. UK-listed (Acc where available). Backtest proxies in [..].
    universe:
      - SMGB.L   # L&G US Semiconductors                  semis (+181%/12m)    [proxy SOXX]
      - REGB.L   # VanEck Rare Earth & Strategic Metals   critical materials   [proxy XME]
      - VPNG.L   # Global X Data Center REITs (Acc)        data centres (+81%)  [proxy QQQ]
      - AIAG.L   # L&G Artificial Intelligence (Acc)       AI (+73%)            [proxy QQQ]
      - INRA.L   # iShares Global Clean Energy (Acc)       renewables (+68%)    [proxy PBW]
      - ROBG.L   # L&G ROBO Global Robotics                robotics (+54%)      [proxy QQQ]
      - VWRP.L   # Vanguard FTSE All-World (Acc)           global ballast       [proxy SPY]
      - SGLN.L   # iShares Physical Gold                   crash diversifier    [proxy GLD]
    guardrails:
      max_correlation: 0.99       # hold the full growth basket (don't de-duplicate)
    sizing:
      type: nav_pct
      max_per_position_pct: 12    # equal-weight: ~8 holdings x ~12% = ~100% invested
      leverage: 1.0
      unit: shares
      stop_pct: 0.30              # wide: exits are regime-driven, not stop-driven
      take_pct: 10.0              # effectively no take-profit (hold/compound)
      trailing_pct: 0.30

  # SIPP — NOTE: IBKR is NOT a direct SIPP provider. At go-live this account is
  # opened by a third-party UK SIPP administrator/trustee that permits an IBKR
  # dealing account: the trustee holds the IBKR account in the pension scheme's
  # name and grants the member trading authority. IBKR = custody + execution;
  # the third party = the SIPP wrapper. The engine is account-agnostic, so only
  # ibkr_account_id changes (placeholder -> the trustee-held sub-account). Before
  # live: confirm the chosen administrator (a) permits IBKR and (b) allows the
  # instruments traded. SIPP permitted-investment rules mean equities/ETFs only —
  # NO FX/leverage/options (already enforced via allowed_assets). ISA/GIA/FOREX
  # are native IBKR accounts and need no third party.
  - book_id: ibkr_sipp_equity
    wrapper: SIPP
    broker: IBKR
    ibkr_account_id: "U_SIPP_PLACEHOLDER"
    allowed_assets: ["EQUITY", "ETF"]   # long-term ETFs preferred
    tax_policy: null
    # SIPP = ENRICHED "PENSION FORTRESS" (2026-06-18): low-turnover allocation holding an
    # EQUAL-WEIGHT DIVERSIFIED basket — a defensive CORE (physical gold + global all-world
    # + income trusts) plus THEMATIC SATELLITES (AI, data centres, critical materials,
    # clean energy, semis, uranium, robotics) — see config.yaml `allocation_basket`.
    # Enriched from pure path-A thematic toward the operator's own diversified concept,
    # which the GFC frontier showed is far more robust (the gold/global/income core breaks
    # the pure-thematic lost-decade tail). Judged on LONG-HORIZON metrics (CAGR/MAR/%
    # positive months), NOT a 5% interim-DD rail (unachievable for any growth SIPP; see
    # validation.py allocation profile). Regime-de-risked; the hard live-authorization
    # gate (operator sign-off) remains the backstop. Still PAPER-ONLY.
    strategy: allocation
    gate_min: 75                  # per-book ENTRY floor: only buy in strong regimes
    aggressive_liquidation: true  # regime de-risk to cash
    derisk_gate: 65               # EXIT floor (hysteresis): hold through dips 65-75,
                                  # only sell on genuine deterioration (anti-whipsaw)
    # Per-book allocation BASKET (the enriched diversified "Pension Fortress"):
    # gold/global/income core + thematic satellites. Held in full (max_correlation 0.99).
    # All accumulating where an Acc class exists. Backtest uses long-history proxies
    # (gold->GLD, global->SPY, income->AGG, AI/semis->QQQ, materials->XME, clean->PBW).
    universe:
      - IGLG.L   # iShares Physical Gold (GBP)            crisis diversifier   [proxy GLD]
      - VWRP.L   # Vanguard FTSE All-World (Acc)          global core          [proxy SPY]
      - BRWM.L   # BlackRock World Mining Trust           royalty/income       [proxy XME]
      - IUKD.L   # iShares UK Dividend                    equity income        [proxy SPY]
      - GCP.L    # GCP Infrastructure                     infra-debt income    [proxy AGG]
      - AIAG.L   # L&G Artificial Intelligence (Acc)      AI                   [proxy QQQ]
      - VPNG.L   # Global X Data Center REITs (Acc)       data centres         [proxy VNQ]
      - REGB.L   # VanEck Rare Earth & Strategic Metals   critical materials   [proxy XME]
      - INRA.L   # iShares Global Clean Energy (Acc)      renewables           [proxy PBW]
      - SMGB.L   # L&G US Semiconductors                  semis                [proxy QQQ]
      - URNP.L   # Sprott Uranium Miners                  nuclear              [proxy XME]
      - ROBG.L   # L&G ROBO Global Robotics               robotics             [proxy QQQ]
    guardrails:
      max_correlation: 0.99       # HOLD the whole basket: the deliberately-chosen basket
                                  # is correlated; the default 0.8 corr guard would
                                  # de-duplicate it to a single holding. Raised so the
                                  # equal-weight thematic basket is held in full.
    sizing:
      type: nav_pct
      max_per_position_pct: 8     # equal-weight: ~12 holdings x ~8% = ~100% invested while
                                  # the regime is favourable (de-risk moves to cash when not)
      leverage: 1.0
      unit: shares
      stop_pct: 0.30             # wide: exits are regime-driven, not stop-driven
      take_pct: 10.0             # effectively no take-profit (hold long-term)
      trailing_pct: 0.30

  - book_id: ibkr_gia_equity
    wrapper: GIA
    broker: IBKR
    ibkr_account_id: "U_GIA_PLACEHOLDER"
    allowed_assets: ["EQUITY", "ETF"]
    tax_policy:
      type: uk_cgt
      higher_rate: false              # set true if a higher-rate taxpayer
    # GIA "Rocket Ship" = AGGRESSIVE US-GROWTH ALLOCATION (reworked 2026-06-20).
    # CHANGED from the tactical ML scanner to a regime-gated, diversified buy-and-hold
    # allocation — the proven ISA/SIPP structure, US-tilted and more aggressive. WHY: the
    # 2026-06-19 Ichimoku staleness+lookahead bug (commit e40b9d2) revealed GIA's tactical
    # scanner "edge" was bug-inflated (on corrected features Sortino 1.34->0.37, PF 7.9->1.7,
    # FAIL); the real edge is the REGIME GATE + allocation, not feature scanning. Allocation's
    # LOW TURNOVER also suits GIA's CGT/tax-efficiency mandate (defers the taxable event).
    # Curve-validated (MAR / % positive months), like ISA/SIPP.
    strategy: allocation
    gate_min: 75                  # validated allocation entry floor (as ISA/SIPP)
    aggressive_liquidation: true  # regime de-risk to cash
    derisk_gate: 65               # EXIT floor (hysteresis), anti-whipsaw
    # Per-book GROWTH BASKET: US AI-infrastructure megacaps (HELD, not scanned) + a gold
    # crash-diversifier + a global ballast. (Dropped vs the old tactical watchlist: IREN/CRML
    # speculative microcaps + 3LNV.L 3x-leveraged — unsafe to BUY-AND-HOLD.) UK investors can
    # hold US single stocks in a GIA. Backtest proxies in [..].
    universe:
      - NVDA     # Nvidia (AI accelerators)        [proxy QQQ]
      - MU       # Micron (AI memory/HBM)          [proxy SOXX]
      - AVGO     # Broadcom (AI silicon)           [proxy QQQ]
      - TSM      # TSMC (foundry)                  [proxy SOXX]
      - ASML     # ASML (litho)                    [proxy SOXX]
      - ANET     # Arista (AI networking)          [proxy QQQ]
      - VRT      # Vertiv (data-centre power)      [proxy QQQ]
      - GEV      # GE Vernova (grid/power)         [proxy SPY]
      - SGLN.L   # iShares Physical Gold           crash diversifier   [proxy GLD]
      - VWRP.L   # Vanguard FTSE All-World (Acc)   global ballast      [proxy SPY]
    guardrails:
      max_correlation: 0.99       # hold the full basket (don't de-duplicate)
    sizing:
      type: nav_pct
      max_per_position_pct: 10    # equal-weight: ~10 holdings x ~10% = ~100% invested
      leverage: 1.0
      unit: shares
      stop_pct: 0.30              # wide: exits are regime-driven, not stop-driven
      take_pct: 10.0              # effectively no take-profit (hold/compound)
      trailing_pct: 0.30

  # Leveraged spot Forex. Wrapper-locked to a taxable margin account — FX/options
  # must NEVER appear in ISA/SIPP allowed_assets. CGT applies to spot FX gains for
  # a UK individual, so tax_policy is uk_cgt (same as GIA). Judged at the
  # account/equity-curve level; sizing is ATR + leverage-capped.
  - book_id: ibkr_forex_margin
    wrapper: MARGIN
    broker: IBKR
    ibkr_account_id: "U_FX_PLACEHOLDER"
    allowed_assets: ["FX"]
    tax_policy:
      type: uk_cgt
      higher_rate: false
    # RE-IMPLEMENTED (2026-06-24): Switched to 5-minute Intraday Framework (MACD/RSI/EMA200)
    # using friction-aware bracket sizing. Re-enabled for the intraday sprint.
    strategy: intraday
    gate_min: 0                       # Intraday trades on momentum, not macro gate
    universe:
      - EURUSD
      - GBPUSD
      - USDJPY
      - AUDUSD
    sizing:
      type: friction_sizing
      risk_pct: 1.0
      leverage: 5.0
      unit: units
      stop_pct: 0.002                 # 20 pips roughly
      take_pct: 0.004                 # 40 pips roughly
      friction_buffer: 0.0001         # 1 pip friction
    guardrails:
      max_drawdown_pct: 20.0
      daily_loss_cap_pct: 3.0
      max_concurrent_positions: 4
      max_correlation: 0.8
      circuit_breaker_losses: 6
      circuit_breaker_cooldown: 15

  # NEW 2026-06-24: Intraday Sleeve for ISA.
  # Gives users the option to allocate funds to high-turnover day-trading within a tax-free wrapper.
  - book_id: ibkr_isa_intraday
    wrapper: ISA
    broker: IBKR
    ibkr_account_id: "U_ISA_INTRADAY_PLACEHOLDER"
    allowed_assets: ["EQUITY", "ETF"]
    tax_policy: null
    strategy: intraday
    gate_min: 0                       # Intraday momentum-driven
    universe:
      - SPY
      - QQQ
    sizing:
      type: friction_sizing
      risk_pct: 2.0
      leverage: 1.0                   # NO margin in ISA
      unit: shares
      stop_pct: 0.005                 # 0.5% stop
      take_pct: 0.01                  # 1.0% take
      friction_buffer: 0.0005         # 0.05% friction
    guardrails:
      max_drawdown_pct: 15.0
      daily_loss_cap_pct: 2.0
      max_concurrent_positions: 5
      max_correlation: 0.99           # allow trading both SPY/QQQ if signals align

  # NEW 2026-06-24: Crypto Book
  - book_id: ibkr_crypto_margin
    wrapper: MARGIN
    broker: IBKR
    ibkr_account_id: "U_CRYPTO_PLACEHOLDER"
    allowed_assets: ["CRYPTO"]
    tax_policy:
      type: uk_cgt
      higher_rate: false
    strategy: intraday
    gate_min: 0                       # Crypto trades 24/7 on momentum
    universe:
      - BTC-USD
      - ETH-USD
    sizing:
      type: friction_sizing
      risk_pct: 2.0
      leverage: 2.0
      unit: units
      stop_pct: 0.02                  # 2% stop
      take_pct: 0.04                  # 4% take
      friction_buffer: 0.001          # 0.1% spread/fee buffer
    guardrails:
      max_drawdown_pct: 30.0          # Higher volatility tolerance
      daily_loss_cap_pct: 5.0
      max_concurrent_positions: 2
      max_correlation: 0.99
