<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <!-- Group with primary brand color #183e63 -->
  <g fill="#183e63">
    <!-- North Point (Beveled) -->
    <polygon points="24,24 24,2 21,18" fill="#0f263d"/>
    <polygon points="24,24 24,2 27,18" fill="#183e63"/>
    
    <!-- South Point (Beveled) -->
    <polygon points="24,24 24,46 27,30" fill="#0f263d"/>
    <polygon points="24,24 24,46 21,30" fill="#183e63"/>
    
    <!-- East Point (Beveled) -->
    <polygon points="24,24 46,24 30,21" fill="#0f263d"/>
    <polygon points="24,24 46,24 30,27" fill="#183e63"/>
    
    <!-- West Point (Beveled) -->
    <polygon points="24,24 2,24 18,27" fill="#0f263d"/>
    <polygon points="24,24 2,24 18,21" fill="#183e63"/>
    
    <!-- Northeast Point -->
    <polygon points="24,24 39.5,8.5 31,18" fill="#0f263d"/>
    <polygon points="24,24 39.5,8.5 37,13" fill="#183e63"/>
    
    <!-- Northwest Point -->
    <polygon points="24,24 8.5,8.5 13,17" fill="#0f263d"/>
    <polygon points="24,24 8.5,8.5 17,13" fill="#183e63"/>
    
    <!-- Southeast Point -->
    <polygon points="24,24 39.5,39.5 37,35" fill="#0f263d"/>
    <polygon points="24,24 39.5,39.5 35,37" fill="#183e63"/>
    
    <!-- Southwest Point -->
    <polygon points="24,24 8.5,39.5 13,35" fill="#0f263d"/>
    <polygon points="24,24 8.5,39.5 11,37" fill="#183e63"/>

    <!-- intermediate small points -->
    <polygon points="24,24 24,10 21,14" fill="#0f263d" opacity="0.5"/>
    <polygon points="24,24 24,10 27,14" fill="#183e63" opacity="0.5"/>
    <polygon points="24,24 38,24 34,21" fill="#0f263d" opacity="0.5"/>
    <polygon points="24,24 38,24 34,27" fill="#183e63" opacity="0.5"/>
    <polygon points="24,24 24,38 27,34" fill="#0f263d" opacity="0.5"/>
    <polygon points="24,24 24,38 21,34" fill="#183e63" opacity="0.5"/>
    <polygon points="24,24 10,24 14,27" fill="#0f263d" opacity="0.5"/>
    <polygon points="24,24 10,24 14,21" fill="#183e63" opacity="0.5"/>
  </g>
  
  <!-- Diagonal Compass Needle (Foreground) -->
  <polygon points="12,36 36,12 25,27 21,21" fill="#183e63" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- Center white pin/hub -->
  <circle cx="24" cy="24" r="3.5" fill="#ffffff" stroke="#183e63" stroke-width="1"/>
</svg>