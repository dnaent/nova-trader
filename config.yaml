# Nova Engine — engine configuration (consumed by load_engine_config()).
# These are starting points to validate in paper trading, not recommendations.

gate_min: 40           # macro gate below this => hold cash, no new buys
exec_threshold: 75     # blended (0.60 quant + 0.40 claude) score required to act
top_n: 10              # max candidates considered per book per cycle

# Universe scanned each cycle. Keep small while paper-testing.
universe:
  - SPY
  - NVDA
  - VWRL
  - FORD
