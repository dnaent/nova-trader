# Nova Engine â€” engine configuration (consumed by load_engine_config()).
# These are starting points to validate in paper trading, not recommendations.

gate_min: 40           # GLOBAL macro-gate floor (per-book gate_min in portfolio.yaml
                       # overrides it: ISA 80, GIA 78, SIPP 75 â€” the validated values)
exec_threshold: 35     # blended (0.60 quant + 0.40 claude) score required to act.
                       # Canonicalised 2026-06-16 from 75: the current ML scanner's
                       # blended scores top out ~52 (mean ~29) â€” 75 is unreachable, so
                       # every validated 8y replay used 35. The regime gate, not this
                       # threshold, is what concentrates trades into good regimes.
top_n: 10              # max candidates considered per book per cycle

# SIPP allocation basket â€” ENRICHED "PENSION FORTRESS" (2026-06-18): equal-weight
# DIVERSIFIED long-horizon pension. A defensive CORE (physical gold + global all-world +
# income trusts) anchors high-growth THEMATIC SATELLITES (all accumulating where an Acc
# class exists). Enriched from pure path-A thematic toward the operator's own diversified
# concept â€” the GFC frontier showed the gold/global/income core breaks the pure-thematic
# lost-decade tail. NOTE: most thematic funds are 2019-2022 inceptions, so HISTORICAL
# REPLAY/validation uses long-history PROXIES (goldâ†’GLD, globalâ†’SPY, incomeâ†’AGG,
# AI/semisâ†’QQQ, materialsâ†’XME, clean energyâ†’PBW); this list is the LIVE/forward basket.
# The SIPP book raises max_correlation so the full basket is held (not de-duplicated).
allocation_basket:
  # --- defensive core (gold + global + income) ---
  - IGLG.L   # iShares Physical Gold (GBP)            crisis diversifier   [proxy GLD]
  - VWRP.L   # Vanguard FTSE All-World (Acc)          global core          [proxy SPY]
  - BRWM.L   # BlackRock World Mining Trust           royalty/income       [proxy XME]
  - IUKD.L   # iShares UK Dividend                    equity income        [proxy SPY]
  - GCP.L    # GCP Infrastructure Investments         infra-debt income    [proxy AGG]
  # --- thematic satellites ---
  - AIAG.L   # L&G Artificial Intelligence (Acc)      AI                   [proxy QQQ]
  - VPNG.L   # Global X Data Center REITs (Acc)       data centres         [proxy VNQ]
  - REGB.L   # VanEck Rare Earth & Strategic Metals   critical materials   [proxy XME]
  - INRA.L   # iShares Global Clean Energy (Acc)      renewables           [proxy PBW]
  - SMGB.L   # L&G US Semiconductors                  semis                [proxy QQQ]
  - URNP.L   # Sprott Uranium Miners                  nuclear              [proxy XME]
  - ROBG.L   # L&G ROBO Global Robotics               robotics             [proxy QQQ]

# Universe scanned each cycle, keyed by asset class so each adapter only scans
# symbols it handles (EquityAdapter -> EQUITY/ETF, FxAdapter -> FX). Keep small
# while paper-testing. A flat list is still accepted (applied to every adapter).
universe:
  EQUITY:
    - SPY
    - NVDA
    - VWRL.L   # Vanguard FTSE All-World (LSE) â€” '.L' routes via yfinance fallback
    - F        # Ford Motor Co (was "FORD" â€” not a valid Yahoo ticker)
  FX:                # 6 majors: the proven v1 set + 2 (USDCAD/USDCHF) to clear the
    - EURUSD=X       # >=300-trade sample and diversify trend-book drawdown
    - GBPUSD=X
    - USDJPY=X
    - AUDUSD=X
    - USDCAD=X
    - USDCHF=X
